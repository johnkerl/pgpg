# CI: build and test all Go and Python code. Format check is advisory only (does not fail the workflow).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.19"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node (for JS tests in make test)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: make build

      - name: Test
        run: make test

  format-advisory:
    name: Format check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.19"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Black
        run: pip install black

      - name: Check Go formatting
        id: go-fmt
        run: |
          set +e
          OUT=$(gofmt -l manual/go generators/go generated/go apps/go 2>/dev/null | grep -v '^$')
          if [ -n "$OUT" ]; then
            echo "needs_format=1" >> "$GITHUB_OUTPUT"
            echo "go_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$OUT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "needs_format=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Python formatting
        id: py-fmt
        run: |
          if black --check generators/py generated/py apps/py 2>/dev/null; then
            echo "needs_format=0" >> "$GITHUB_OUTPUT"
          else
            echo "needs_format=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR (format advisory)
        if: steps.go-fmt.outputs.needs_format == '1' || steps.py-fmt.outputs.needs_format == '1'
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.pull_request) return;
            const goBad = process.env.GO_FMT_NEEDED === '1';
            const pyBad = process.env.PY_FMT_NEEDED === '1';
            const parts = [];
            if (goBad) parts.push('**Go** (some files are not `gofmt`-ed)');
            if (pyBad) parts.push('**Python** (some files are not formatted with Black)');
            const body = `## Code formatting (advisory)

            ${parts.join(' and ')}. This does not fail CI.

            **To fix from the repo root:**
            \`\`\`bash
            make fmt
            \`\`\`
            Then commit the changes.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
        env:
          GO_FMT_NEEDED: ${{ steps.go-fmt.outputs.needs_format }}
          PY_FMT_NEEDED: ${{ steps.py-fmt.outputs.needs_format }}

      - name: Emit warning for format (Actions summary)
        if: steps.go-fmt.outputs.needs_format == '1' || steps.py-fmt.outputs.needs_format == '1'
        run: |
          echo "::warning::Code needs reformatting. From repo root run: make fmt"
          if [ "${{ steps.go-fmt.outputs.needs_format }}" = "1" ]; then
            echo "::warning::Go: run 'make fmt' (uses gofmt)"
          fi
          if [ "${{ steps.py-fmt.outputs.needs_format }}" = "1" ]; then
            echo "::warning::Python: run 'make fmt' (uses black)"
          fi
          echo "This is advisory only and does not fail the workflow."
